<!DOCTYPE HTML>
<html>
	<head>
		<title>Council Minutes - AYR ROTARY</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			.private-page {
				max-width: 900px;
				margin: 0 auto;
				padding: 3em 2em 4em 2em;
				box-sizing: border-box;
			}

			.private-box {
				background: #f7f7f7;
				border: 1px solid #dcdcdc;
				border-radius: 8px;
				padding: 2em;
			}

			.private-box h2 {
				margin-top: 0;
			}

			@media screen and (max-width: 736px) {
				.private-page {
					padding: 2em 1em 3em 1em;
				}
			}
		</style>
	</head>

	<body class="is-preload">
		<div id="wrapper">
			<div id="main">

				<header id="header">
					<div class="ayr-topbar">
						<a href="index.html" class="ayr-brand-image">
							<img src="images/ayr-logo-strip.jpg" alt="Rotary Club of Ayr" />
						</a>

						<nav class="ayr-nav">
							<a href="members-home.html" class="active">Members</a>
						</nav>
					</div>
				</header>

				<div class="inner">
					<section class="private-page">
						<div class="private-box">
							<h2>Council Minutes</h2>
							<p><strong>Test page</strong></p>
							<p>
								This is where council minutes would appear in the prototype members area.
							</p>
							<p>
								For now, use it only to test that login and redirection are working.
							</p>
							<p>
								<a href="members-home.html" class="button small">Back to Members Home</a>
							</p>
						</div>
					</section>
				</div>

			</div>
		</div>

		<script type="text/javascript" src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
		<script>
			if (window.netlifyIdentity) {
				window.netlifyIdentity.init();

				var user = window.netlifyIdentity.currentUser();
				if (!user) {
					document.location.href = "/members-login.html";
				}
			}
		</script>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
	</body>
</html>
