<!DOCTYPE HTML>
<html>
	<head>
		<title>Members Login - AYR ROTARY</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			.members-login-page {
				max-width: 760px;
				margin: 0 auto;
				padding: 3em 2em 4em 2em;
				box-sizing: border-box;
				text-align: center;
			}

			.members-login-box {
				background: #f7f7f7;
				border: 1px solid #dcdcdc;
				border-radius: 8px;
				padding: 2em;
			}

			.members-login-box h2 {
				margin-bottom: 0.6em;
			}

			.members-login-box p {
				margin-bottom: 1.25em;
			}

			.identity-button-wrap {
				margin-top: 1.5em;
			}

			[data-netlify-identity-button] a,
			[data-netlify-identity-button] {
				display: inline-block;
				background: #ffffff;
				box-shadow: inset 0 0 0 2px #f56a6a;
				color: #f56a6a !important;
				border-radius: 0.375em;
				padding: 0.9em 1.5em;
				font-family: "Roboto Slab", serif;
				font-weight: 700;
				text-transform: uppercase;
				letter-spacing: 0.075em;
				border-bottom: none !important;
				text-decoration: none !important;
				cursor: pointer;
			}

			@media screen and (max-width: 736px) {
				.members-login-page {
					padding: 2em 1em 3em 1em;
				}
			}
		</style>
	</head>

	<body class="is-preload">
		<div id="wrapper">
			<div id="main">

				<header id="header">
					<div class="ayr-topbar">
						<a href="index.html" class="ayr-brand-image">
							<img src="images/ayr-logo-strip.jpg" alt="Rotary Club of Ayr" />
						</a>

						<nav class="ayr-nav">
							<a href="index.html">Home</a>
							<a href="about.html">About Us</a>
							<a href="projects.html">Projects</a>
							<a href="GetInvolved.html">Get Involved</a>
							<a href="meetings.html">Meetings</a>
							<a href="news.html">News</a>
							<a href="contact.html">Contact</a>
						</nav>
					</div>
				</header>

				<div class="inner">
					<section class="members-login-page">
						<div class="members-login-box">
							<h2>Members Login</h2>
							<p>
								This area is for invited members of Rotary Club of Ayr.
							</p>
							<p>
								Please sign in using your invited email address.
							</p>

							
                            
                            <div class="identity-button-wrap">
	<div data-netlify-identity-button></div>
</div>


					</section>
				</div>

			</div>
		</div>

		<script type="text/javascript" src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
		<script>
			if (window.netlifyIdentity) {
				window.netlifyIdentity.on("login", function () {
					document.location.href = "/members-home.html";
				});
			}
		</script>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>
	</body>
</html>
